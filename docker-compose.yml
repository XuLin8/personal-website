version: '3.8'

services:
  nginx:
    image: nginx:alpine
    container_name: personal-website
    restart: unless-stopped
    ports:
      - "8080:80"
    volumes:
      - ./data:/usr/share/nginx/html:ro
      - ./nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
    networks:
      - web-net

networks:
  web-net:
    driver: bridge
